<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Test</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>

    <section class="top">
        <div class="Logo">
            <img src="Logo.svg" alt="">
        </div>
        <h2 class="trophy">
            <img class="trophyy" src="Trophy Icon.svg" alt="">
            Personal best: <span id="best">0</span> WPM
        </h2>
    </section>

    <section class="middle">
        <section class="WAT">
            <div><h2>WPM: <span id="wpm">0</span></h2></div>
            <div><h2>Accuracy: <span id="accuracy">0</span></h2></div>
            <div><h2>Time: <span id="time">67</span></h2></div>
        </section>

        <section class="difficulty">
            <h2>Difficulty:</h2>
            <button class="budiff" data-level="easy">Easy</button>
            <button class="budiff" data-level="medium">Medium</button>
            <button class="budiff" data-level="hard">Hard</button>
        </section>
    </section>

    <section class="bottom">

        <div id="wordDisplay" class="wordDisplaything"></div>
        <textarea id="area"></textarea>

        <div id="startclick" class="startclick">
            <button id="start" class="blue">Start Typing Test</button>
            <h3>Or just click the box and start typing</h3>
        </div>
    </section>
    
</main>
<script src="js.js"></script>
</body>
</html>
